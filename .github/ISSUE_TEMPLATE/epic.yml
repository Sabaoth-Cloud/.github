name: Epic
description: A major deliverable that breaks an initiative into stories and is typically owned by the engineering lead.
title: "[EPIC] "
labels:
  - Epic
body:
  - type: markdown
    attributes:
      value: |
        Link this Epic to its parent Initiative using `#issue-number` in the description, assign the Engineering Lead in the sidebar, and set the target quarter.

  - type: textarea
    id: outcome
    attributes:
      label: What this epic delivers
      description: Describe the outcome that exists once this is done, not a list of tasks.
      placeholder: "e.g. Users can pay in UGX with live USD conversion at checkout."
    validations:
      required: true

  - type: textarea
    id: expected-stories
    attributes:
      label: Expected stories
      description: Roughly list the stories this should break into. Expect this to evolve as the team refines scope.
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Checklist for how we know the Epic is complete, not just a single story.
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: dropdown
    id: target-quarter
    attributes:
      label: Target quarter
      description: The quarter in which the team expects this Epic to be completed.
      options:
        - Q1
        - Q2
        - Q3
        - Q4
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Known risks or dependencies
      description: Flag anything that could delay delivery or block completion.
    validations:
      required: false
