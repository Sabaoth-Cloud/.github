name: Task
description: The specific technical work needed to complete a Story.
title: "[TASK] "
labels:
  - Task
body:
  - type: input
    id: clickup-id
    attributes:
      label: ClickUp Strategic ID
      description: The ClickUp Task ID associated with this task.
      placeholder: "#CU-86bx123"
    validations:
      required: true

  - type: input
    id: parent-story
    attributes:
      label: Parent GitHub Story
      description: Issue number of the GitHub Story this task belongs to.
      placeholder: "#123"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What needs to be done
      placeholder: "e.g., Configure Kubernetes operators for the new PostgreSQL cluster."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Checklist — what has to be true for this to move to Done.
    validations:
      required: true
