name: Story
description: A functional unit of work written, self-assigned, and delivered by an engineer within one sprint.
title: "[STORY] "
labels:
  - Story
body:
  - type: input
    id: clickup-id
    attributes:
      label: ClickUp Strategic ID
      description: The ClickUp Task ID associated with this story (e.g., #CU-86bx123).
      placeholder: "#CU-86bx123"
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a [user], I can [action] so that [outcome]."
      value: "As a [user], I can [action] so that [outcome]."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Checklist of what has to be true for this to move to Done.
      placeholder: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Estimated effort.
      options:
        - "Small (1 day)"
        - "Medium (2–3 days)"
        - "Large (4–5 days)"
    validations:
      required: true
