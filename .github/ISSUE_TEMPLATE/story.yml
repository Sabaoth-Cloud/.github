name: Story
description: A unit of work written, self-assigned, and delivered by an engineer within one sprint.
title: "[STORY] "
labels:
  - Story
body:
  - type: markdown
    attributes:
      value: |
        Link this Story to its parent Epic using `#issue-number` in the description and assign it to yourself in the sidebar. Ensure the size is set.
        
  - type: input
    id: parent-epic
    attributes:
      label: Parent Epic
      description: Issue number of the Epic this story belongs to.
      placeholder: "#123"
    validations:
      required: true

  - type: input
    id: feature-area
    attributes:
      label: Feature Area
      description: What feature area does this belong to? Do not use labels for feature areas.
      placeholder: "e.g. Authentication, Checkout, User Profile"
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Replace the bracketed text with your specific requirements.
      value: "As a [user], I can [action] so that [outcome]."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Checklist of what has to be true for this to move to Done.
      placeholder: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Estimated effort. Set during backlog grooming and used in sprint planning.
      options:
        - "Small (1 day)"
        - "Medium (2–3 days)"
        - "Large (4–5 days)"
    validations:
      required: true