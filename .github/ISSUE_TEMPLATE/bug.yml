name: Bug
description: Software defects or regressions identified during development, staging, or production.
title: "[BUG] "
labels:
  - Bug
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority (SLA)
      options:
        - "P0 — Critical (same day)"
        - "P1 — High (24 hrs)"
        - "P2 — Medium (next sprint)"
        - "P3 — Low (backlog)"
    validations:
      required: true

  - type: input
    id: clickup-id
    attributes:
      label: ClickUp Strategic ID
      description: The associated ClickUp Task ID for status tracking.
      placeholder: "#CU-86bx123"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "e.g., staging cluster, PROD-MSP-VM-4"
    validations:
      required: true
