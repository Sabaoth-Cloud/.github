name: Initiative
description: A strategic goal owned by leadership and rolled up through a GitHub Milestone.
title: "[INITIATIVE] "
labels:
  - Initiative
body:
  - type: markdown
    attributes:
      value: |
        Create a Milestone named `2026 — [Initiative name]` and link Epics to it once they exist. This issue is for the one-sentence goal, the measurable outcome, and the decision log.

  - type: input
    id: milestone
    attributes:
      label: Linked Milestone
      description: The Milestone that groups this Initiative's Epics.
      placeholder: "2026 — [Initiative name]"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One sentence. What strategic outcome does this deliver?
      placeholder: "e.g. Launch Tranzio in one city."
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Measurable outcome
      description: How we'll know this succeeded — a number, a launch, a percentage, or another checkable result.
    validations:
      required: true

  - type: textarea
    id: epics
    attributes:
      label: Epics under this initiative
      description: Rough list of the Epics that should be created for this Initiative. Refine as the Engineering Lead breaks it down.
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: false

  - type: dropdown
    id: year
    attributes:
      label: Target year
      description: The year this Initiative is intended to deliver against.
      options:
        - "2026"
        - "2027"
    validations:
      required: true