name: Validate templates and workflows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run structural validation
        run: node scripts/validate.mjs

      - name: Run actionlint
        uses: rhysd/actionlint@v1
