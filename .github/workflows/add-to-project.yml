name: Add issues to project board (Reusable)

on:
  workflow_call:
    inputs:
      project-url:
        description: Full URL of the GitHub Project board (e.g. https://github.com/orgs/Sabaoth-Cloud/projects/1)
        required: true
        type: string
      labeled:
        description: Comma-separated list of labels that trigger adding the issue to the board
        required: false
        type: string
        default: "bug, enhancement"
    secrets:
      ADD_TO_PROJECT_PAT:
        description: Personal Access Token with repo and project scopes
        required: true

jobs:
  add-to-board:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2
        with:
          project-url: ${{ inputs.project-url }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          labeled: ${{ inputs.labeled }}
