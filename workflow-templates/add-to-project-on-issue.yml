name: Add labeled issues to project board

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  add-to-board:
    uses: Sabaoth-Cloud/.github/.github/workflows/add-to-project.yml@main
    with:
      project-url: https://github.com/orgs/Sabaoth-Cloud/projects/1
    secrets:
      ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
