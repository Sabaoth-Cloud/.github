name: 🐛 Bug Report
description: Report a bug to help us improve
title: "🐛 [BUG] <short description>"
labels:
  - bug
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ Please search [existing issues](../../issues) before submitting to avoid duplicates.

  - type: dropdown
    id: environment
    attributes:
      label: 🌍 Environment
      description: Where did you encounter this bug?
      options:
        - "🧑‍💻 DEV — Development"
        - "🧪 TEST — Testing"
        - "🔎 UAT — User Acceptance Testing"
        - "🚀 PRD — Production"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: 📝 What happened?
      description: A clear description of the bug — what you expected vs. what actually happened.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 🔁 Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: minimal-example
    attributes:
      label: 🧩 Code / Error Output
      description: Paste a minimal reproducible snippet and/or the full traceback.
      placeholder: |
        # Minimal code that triggers the bug

        # --- Traceback ---
    validations:
      required: true

  - type: textarea
    id: version-info
    attributes:
      label: 🛠️ Environment Info
      description: Version information, runtime environment, OS, and any other relevant package versions.
      placeholder: |
        Project Version: 1.0.0
        Runtime:        (e.g., Python 3.11, Node.js 20, etc.)
        OS:             (e.g., Ubuntu 22.04, macOS 14, Windows 11)
    validations:
      required: true