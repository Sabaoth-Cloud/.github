name: 🐛 Bug Report
description: Report a bug to help us improve FastAPI
title: "🐛 [BUG] <short description>"
labels:
  - bug
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ Please search [existing issues](../../issues) before submitting to avoid duplicates.

  - type: dropdown
    id: environment
    attributes:
      label: 🌍 Environment
      description: Where did you encounter this bug?
      options:
        - "🧑‍💻 DEV — Development"
        - "🧪 TEST — Testing"
        - "🔎 UAT — User Acceptance Testing"
        - "🚀 PRD — Production"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: 📝 What happened?
      description: A clear description of the bug — what you expected vs. what actually happened.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 🔁 Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: minimal-example
    attributes:
      label: 🧩 Code / Error Output
      description: Paste a minimal reproducible snippet and/or the full traceback.
      render: python
      placeholder: |
        # Minimal code that triggers the bug

        # --- Traceback ---
        # Paste error output here
    validations:
      required: true

  - type: textarea
    id: version-info
    attributes:
      label: 🛠️ Environment Info
      description: FastAPI version, Python version, OS, and any other relevant package versions.
      placeholder: |
        FastAPI: 0.110.0
        Python:  3.11.4
        OS:      Ubuntu 22.04
    validations:
      required: true