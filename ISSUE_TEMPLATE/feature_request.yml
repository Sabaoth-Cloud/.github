name: 🚀 Feature Request
description: Suggest a new feature or enhancement for FastAPI
title: "🚀 [FEATURE] <short description>"
labels:
  - enhancement
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        > 💡 Please search [existing issues](../../issues) before submitting to see if this has already been requested.

  - type: textarea
    id: summary
    attributes:
      label: 📝 What would you like?
      description: A clear and concise description of the feature you are requesting.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 💡 Why is it needed?
      description: What problem does this solve? What's your use case?
      placeholder: Explain the problem this feature would solve...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 🛠️ Proposed Solution
      description: How would you like it to work? Include example usage if relevant.
      render: python
      placeholder: |
        # Example of how the feature might look/work
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives or Additional Context
      description: Any alternatives you've considered, workarounds, or extra context.
      placeholder: What else should we know?